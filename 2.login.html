<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>登入範例</title>
</head>
<body>

    <!-- 登入表單，使用 POST 方法傳送資料到 2.login.php -->
    <form method="post" action="2.login.php">
        
        <!-- 帳號輸入欄位 -->
        帳號：<input type="text" name="id"><br />
        
        <!-- 密碼輸入欄位（會隱藏輸入內容） -->
        密碼：<input type="password" name="pwd"><p></p>
        
        <!-- 送出按鈕：將資料送到 PHP 進行驗證 -->
        <input type="submit" value="登入">
        
        <!-- 重設按鈕：清空輸入內容 -->
        <input type="reset" value="清除">
        
    </form>

</body>
</html>
